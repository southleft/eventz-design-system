name: 'Chromatic'

on:
  push:
    branches:
      - test/debug_chromatic_light_mode

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Clean generated token CSS (keep index.css)
        working-directory: packages/core
        run: |
          rm -f styles/css/tokens.css || true
          rm -f styles/css/light.css || true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Chromatic (CLI)
        run: pnpm -F @doxyz/core chromatic -- --force-rebuild
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
