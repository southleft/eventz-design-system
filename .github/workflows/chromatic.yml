name: 'Chromatic'

on:
  push:
    branches:
      - test/debug_chromatic_light_mode

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm -F @doxyz/core chromatic -- --only-changed=false
      - name: Run Chromatic (CLI)
        run: pnpm -F @doxyz/core chromatic
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
