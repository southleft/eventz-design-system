name: ci
on:
  push: { branches: [development] }
  pull_request: { branches: [development] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w lint
      - run: pnpm -w type-check
      - run: pnpm agents:verify
      - run: pnpm check:doc-blocks
      - run: pnpm -w test
      - run: pnpm --filter @doxyz-ui/core build
      - run: pnpm --filter @doxyz-ui/core exec npm pack --dry-run
