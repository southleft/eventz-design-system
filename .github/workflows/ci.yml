name: ci
on:
  push: { branches: [development] }
  pull_request: { branches: [development] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @doxyz/core lint
      - run: pnpm --filter @doxyz/core type-check
      - run: pnpm --filter @doxyz/core test
      - run: pnpm --filter @doxyz/core build
      - run: pnpm --filter @doxyz/core exec npm pack --dry-run
