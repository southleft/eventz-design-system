<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
  /* preview-head.html or preview.css */
  #storybook-root * {
    font-family: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial !important;
  }

  /* Let inline code and table cells wrap in Docs */
  .sbdocs code {
    white-space: break-spaces;
    overflow-wrap: normal;
  }

  .sbdocs pre {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .sbdocs table td,
  .sbdocs table th {
    overflow-wrap: normal;
  }

  .sbdocs table tr:nth-child(even),
  .sbdocs table tr:nth-child(odd) {
    background-color: transparent !important;
  }
</style>
